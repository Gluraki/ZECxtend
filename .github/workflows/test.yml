name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-python:
    name: Pytest (api-server)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip -r api-server/shared/requirements.txt pytest

      - name: Run tests
        run: pytest api-server/tests -q
