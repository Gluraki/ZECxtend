name: Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-python:
    name: Ruff (api-server)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff

      - name: Run Ruff
        run: ruff check api-server

  lint-website:
    name: ESLint (website)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Run lint
        working-directory: website
        run: npm run lint

  lint-timekeeper-app:
    name: ESLint (timekeeper-app)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: timekeeper-app/package-lock.json

      - name: Install dependencies
        working-directory: timekeeper-app
        run: npm ci

      - name: Run lint
        working-directory: timekeeper-app
        run: npm run lint
