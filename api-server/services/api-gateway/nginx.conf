events {}

http {
    upstream auth_service { server auth-service:8001; }
    upstream roster_service { server user-service:8002; }
    upstream challenge_service { server challenge-service:8003; }
    upstream attempt_service { server attempt-service:8004; }

    map $http_x_api_key $skip_auth {
        default 0;
        "api-key-1-very-secret" 1;
        "api-key-2-very-secret" 1;
    }

    server {
        listen 80;
        client_max_body_size 100M;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-API-Key $http_x_api_key;

        # CORS
        map $request_method $cors_max_age {
            OPTIONS 1728000;
            default 0;
        }

        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-API-Key" always;

        # Internal
        location = /internal/verify/admin {
            internal;
            if ($skip_auth = 1) { return 204; }
            proxy_pass http://auth_service/api/auth/internal/verify/admin;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        location = /internal/verify/teamlead {
            internal;
            if ($skip_auth = 1) { return 204; }
            proxy_pass http://auth_service/api/auth/internal/verify/teamlead;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        location = /internal/verify/viewer {
            internal;
            if ($skip_auth = 1) { return 204; }
            proxy_pass http://auth_service/api/auth/internal/verify/viewer;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # Auth
        location = /login {
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://auth_service/api/auth/login;
        }

        location = /refresh {
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://auth_service/api/auth/refresh;
        }

        # Users
        location = /users/me {
            if ($request_method = OPTIONS) { return 204; }
            auth_request /internal/verify/teamlead;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $team_id $upstream_http_x_team_id;
            auth_request_set $role    $upstream_http_x_role;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-Team-Id $team_id;
            proxy_set_header X-Role    $role;
            proxy_pass http://roster_service/api/users/me;
        }

        location ~ ^/users(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            auth_request /internal/verify/admin;
            proxy_pass http://roster_service/api/users$1$is_args$args;
        }

        # Teams
        location ~ ^/teams(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            auth_request /internal/verify/teamlead;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $team_id $upstream_http_x_team_id;
            auth_request_set $role    $upstream_http_x_role;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-Team-Id $team_id;
            proxy_set_header X-Role    $role;
            proxy_pass http://roster_service/api/teams$1$is_args$args;
        }
        # Drivers
        location ~ ^/drivers(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            auth_request /internal/verify/teamlead;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $team_id $upstream_http_x_team_id;
            auth_request_set $role    $upstream_http_x_role;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-Team-Id $team_id;
            proxy_set_header X-Role    $role;
            proxy_pass http://roster_service/api/drivers$1$is_args$args;
        }

        # Challenges
        location ~ ^/challenges(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            if ($request_method = GET)     { 
                proxy_pass http://challenge_service/api/challenges$1$is_args$args;
                break;
            }
            auth_request /internal/verify/admin;
            proxy_pass http://challenge_service/api/challenges$1$is_args$args;
        }

        # Attempts
        location ~ ^/attempts(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            auth_request /internal/verify/admin;
            proxy_pass http://attempt_service/api/attempts$1$is_args$args;
        }

        # Scores
        location ~ ^/scores(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            auth_request /internal/verify/admin;
            proxy_pass http://attempt_service/api/scores$1$is_args$args;
        }
        # Penalties
        location ~ ^/penalties(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            auth_request /internal/verify/admin;
            proxy_pass http://attempt_service/api/penalties$1$is_args$args;
        }

        # Leaderboard
        location ~ ^/leaderboard(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://attempt_service/api/leaderboard$1$is_args$args;
        }

        # Exports
        location ~ ^/export/leaderboard(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            add_header Access-Control-Expose-Headers "Content-Disposition" always;
            auth_request /internal/verify/admin;
            proxy_pass http://attempt_service/api/export/leaderboard$1$is_args$args;
        }

        location ~ ^/export/attempts(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            add_header Access-Control-Expose-Headers "Content-Disposition" always;
            auth_request /internal/verify/admin;
            proxy_pass http://attempt_service/api/export/attempts$1$is_args$args;
        }
    }
}
