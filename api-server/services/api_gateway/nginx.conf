events {}

http {

    resolver 1.1.1.1 ipv6=off;

    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    lua_ssl_verify_depth 5;

    upstream attempt_service { server attempt-service:8001; }
    upstream auth_service { server auth-service:8002; }
    upstream roster_service { server roster-service:8003; }

    server {
        listen 80;

        client_max_body_size 100M;

        location = /login {
            proxy_pass http://auth_service/login;
        }

        location /test {
            access_by_lua_file /etc/nginx/lua/auth.lua;

            if ($http_x_role != "admin") {
                return 403;
            }

            proxy_pass http://roster_service/api/users;
        }

        location /challenges {
            access_by_lua_file /etc/nginx/lua/auth.lua;

            proxy_pass http://attempt_service/api/challenges;
        }

        location /users {
            proxy_pass http://auth_service/users/;
        }
    }
}
