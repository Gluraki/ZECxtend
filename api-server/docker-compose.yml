services:
  nginx:
    build: ./services/api_gateway
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      auth-service:
        condition: service_healthy
      challenge-service:
        condition: service_healthy
      attempt-service:
        condition: service_healthy
      roster-service:
        condition: service_healthy
    networks:
      - public
      - internal

  attempt-service:
    build:
      context: .
      dockerfile: services/attempt_service/Dockerfile
    container_name: attempt-service
    depends_on:
      db:
        condition: service_healthy
    environment:
      PROJECT_NAME: attempt-service
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CHALLENGE_SERVICE_URL: http://challenge-service:8003
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  auth-service:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    container_name: auth-service
    depends_on:
      db:
        condition: service_healthy
    environment:
      PROJECT_NAME: auth-service
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AUTHENTIK_URL: http://authentik:9000
      ROSTER_SERVICE_URL: http://roster-service:8001
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  challenge-service:
    build:
      context: .
      dockerfile: services/challenge_service/Dockerfile
    container_name: challenge-service
    depends_on:
      db:
        condition: service_healthy
    environment:
      PROJECT_NAME: challenge-service
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  roster-service:
    build:
      context: .
      dockerfile: services/roster_service/Dockerfile
    container_name: roster-service
    depends_on:
      db:
        condition: service_healthy
    environment:
      PROJECT_NAME: roster-service
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AUTH_SERVICE_URL: http://auth-service:8002
      AUTHENTIK_URL: http://authentik:9000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  db:
    image: postgres:18-alpine
    container_name: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  pgweb:
    image: sosedoff/pgweb
    container_name: pgweb
    restart: unless-stopped
    ports:
      - "8080:8081"
    environment:
      PGWEB_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    networks:
      - public
      - internal

  migrator:
    build:
      context: .
      dockerfile: Dockerfile.migrator
    container_name: migrator
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
    volumes:
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    networks:
      - internal
    profiles:
      - migrate

volumes:
  db_data:
  authentik_db_data:

networks:
  public:
  internal:
    internal: true