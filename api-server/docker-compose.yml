services:
  nginx:
    build: ./services/api-gateway
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - challenge-service
      - score-service
      - attempt-service
      - team-service
      - user-service

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PROJECT_NAME: user-service
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AUTH_SERVICE_URL: http://auth-service:8002
      TEAM_SERVICE_URL: http://team-service:8006
      AUTHENTIK_URL: ${AUTHENTIK_URL}

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PROJECT_NAME: auth-service
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AUTHENTIK_URL: ${AUTHENTIK_URL}
      USER_SERVICE_URL: http://user-service:8001

  challenge-service:
    build:
      context: .
      dockerfile: services/challenge-service/Dockerfile
    container_name: challenge-service
    ports:
      - "8003:8003"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PROJECT_NAME: challenge-service
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  attempt-service:
    build:
      context: .
      dockerfile: services/attempt-service/Dockerfile
    container_name: attempt-service
    ports:
      - "8004:8004"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PROJECT_NAME: attempt-service
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SCORE_SERVICE_URL: http://score-service:8005
      TEAM_SERVICE_URL: http://team-service:8006
      CHALLENGE_SERVICE_URL: http://challenge-service:8003

  score-service:
    build:
      context: .
      dockerfile: services/score-service/Dockerfile
    container_name: score-service
    ports:
      - "8005:8005"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PROJECT_NAME: score-service
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CHALLENGE_SERVICE_URL: http://challenge-service:8003
      ATTEMPT_SERVICE_URL: http://attempt-service:8004
      TEAM_SERVICE_URL: http://team-service:8006

  team-service:
    build:
      context: .
      dockerfile: services/team-service/Dockerfile
    container_name: team-service
    ports:
      - "8006:8006"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PROJECT_NAME: team-service
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ATTEMPT_SERVICE_URL: http://attempt-service:8004

  db:
    image: postgres:18
    container_name: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  authentik:
    image: ghcr.io/goauthentik/server:2024.12
    container_name: authentik
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: db
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD}
      AUTHENTIK_POSTGRESQL__NAME: ${POSTGRES_DB}
    ports:
      - "9000:9000"
    depends_on:
      db:
        condition: service_healthy

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.12
    container_name: authentik-worker
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: db
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD}
      AUTHENTIK_POSTGRESQL__NAME: ${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy

  pgweb:
    image: sosedoff/pgweb
    container_name: pgweb
    ports:
      - "8080:8081"
    environment:
      PGWEB_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: